name: Feature request
description: Suggest a new feature
title: "[FEATURE] "
labels: ["enhancement"]

body:
    - type: textarea
      id: problem
      attributes:
          label: Problem
          description: What problem does this solve?
          placeholder: Describe the problem
      validations:
          required: true

    - type: textarea
      id: solution
      attributes:
          label: Proposed solution
          placeholder: Describe your idea
      validations:
          required: true

    - type: textarea
      id: alternatives
      attributes:
          label: Alternatives
          placeholder: Other approaches considered
